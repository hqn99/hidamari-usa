<main>
	<h2 class="section-title">
		<span class="icon"></span>お問い合わせ
	</h2>
  <form  action="confirm.php" method="POST">
    <p>販売作品やオーダーなど、<br>わからないことがあれば下記フォームにてお気軽にお問い合わせください。</p><br>
    <div class="type">
      <label for="type">お問い合わせ種別 <span class="required">（必須）</span></label><br>
      <input type="radio" name="type" value="オーダー" checked> オーダーについて<br>
      <input type="radio" name="type" value="作品"> 作品について<br>
      <input type="radio" name="type" value="リクエスト"> リクエスト<br>
      <input type="radio" name="type" value="その他"> その他
    </div>
    <br>
    <div class="name">
      <label for="name">お名前 <span class="required">（必須）</span></label><br>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="email">
      <label for="email">メールアドレス <span class="required">（必須）</span></label><br>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="message">
      <label for="message">お問い合わせ内容</label><br>
      <textarea id="message" name="message" rows="5" required></textarea>
    </div>
    <div class="button">
        <button type="button">確認画面へ</button>
    </div>
  </form>
